<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Order Status</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@400;600;700&family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:        #1A5C4A;
    --white:     #ffffff;
    --divider:   rgba(255,255,255,0.25);
    --name-size: 42px;
    --header-size: 18px;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
  }
  body {
    font-family: 'Inter', sans-serif;
    display: flex;
    flex-direction: column;
    height: 100vh;
    color: var(--white);
  }

  /* ── HEADER ─────────────────────────────────────────────── */
  .board-header {
    flex-shrink: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 28px;
    padding: 24px 40px 18px;
    position: relative;
  }
  .brand-logo {
    width: 80px;
    height: 80px;
    object-fit: contain;
    border-radius: 50%;
    flex-shrink: 0;
    display: none; /* shown when logo loads */
  }
  .board-title {
    font-family: 'Oswald', sans-serif;
    font-size: clamp(32px, 4.5vw, 60px);
    font-weight: 700;
    letter-spacing: 4px;
    text-transform: uppercase;
    text-align: center;
    white-space: nowrap;
  }
  .header-time,
  .header-store-name {
    position: absolute;
    top: 50%;
    transform: translateY(-50%);
    font-family: 'Oswald', sans-serif;
    font-size: clamp(13px, 1.6vw, 24px);
    font-weight: 400;
    letter-spacing: 1px;
    opacity: 0.85;
    white-space: nowrap;
  }
  .header-time       { left: 24px; }
  .header-store-name { right: 24px; }

  /* ── COLUMNS ────────────────────────────────────────────── */
  .board-body {
    flex: 1;
    display: grid;
    grid-template-columns: 1fr 1fr 1fr;
    overflow: hidden;
    min-height: 0;
  }
  .col {
    display: flex;
    flex-direction: column;
    overflow: hidden;
    border-right: 1px solid var(--divider);
  }
  .col:last-child { border-right: none; }

  .col-header {
    flex-shrink: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    padding: 14px 16px 12px;
    border-bottom: 1px solid var(--divider);
  }
  .col-icon {
    font-size: calc(var(--header-size) * 1.5);
    line-height: 1;
  }
  .col-title {
    font-family: 'Oswald', sans-serif;
    font-size: var(--header-size);
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    opacity: 0.9;
  }

  /* ── NAMES LIST ─────────────────────────────────────────── */
  .col-names {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: flex-start;
    padding: 16px 12px;
    gap: 4px;
    overflow: hidden;
    min-height: 0;
  }
  .name-row {
    font-family: 'Oswald', sans-serif;
    font-size: var(--name-size);
    font-weight: 400;
    text-align: center;
    white-space: nowrap;
    opacity: 0.95;
    animation: fadeSlide 0.35s ease;
    line-height: 1.15;
    max-width: 100%;
    overflow: hidden;
    text-overflow: ellipsis;
  }
  @keyframes fadeSlide {
    from { opacity: 0; transform: translateY(-6px); }
    to   { opacity: 0.95; transform: translateY(0); }
  }

  /* ── FOOTER ─────────────────────────────────────────────── */
  .board-footer {
    flex-shrink: 0;
    padding: 6px 20px;
    text-align: center;
    font-size: 10px;
    opacity: 0.3;
    letter-spacing: 0.2px;
  }

  /* ── NO-STORE OVERLAY ───────────────────────────────────── */
  .no-store {
    position: fixed; inset: 0;
    background: var(--bg);
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 12px;
    color: var(--white);
    font-family: 'Oswald', sans-serif;
  }
  .no-store h1 { font-size: 28px; font-weight: 700; }
  .no-store p  { font-size: 16px; opacity: .75; }

  /* ── DEBUG PANEL ── */
  #debugPanel {
    position: fixed; bottom: 12px; left: 12px; z-index: 9999;
    background: rgba(0,0,0,0.88); color: #ccc;
    font-family: 'Courier New', monospace; font-size: 11.5px; font-weight: 500;
    line-height: 1.8; padding: 10px 14px; border-radius: 8px;
    max-width: 420px; word-break: break-all;
    box-shadow: 0 2px 20px rgba(0,0,0,0.6); display: none;
  }
  #debugPanel.visible { display: block; }
  #debugPanel b       { color: #fff; font-size: 12px; }
  #debugPanel .ok     { color: #2ecc71; }
  #debugPanel .warn   { color: #f39c12; }
  #debugPanel .err    { color: #e74c3c; }
  #debugPanel button.env-btn {
    display: inline-block; margin: 4px 6px 4px 0;
    padding: 8px 14px; border-radius: 6px; border: 1px solid #555;
    background: #222; color: #aaa; font-family: 'Courier New', monospace;
    font-size: 13px; cursor: pointer; line-height: 1.4;
  }
  #debugPanel button.env-btn:hover  { border-color: #888; color: #fff; }
  #debugPanel button.env-btn.active { background: #1a4a2a; border-color: #2ecc71; color: #2ecc71; }
</style>
</head>
<body>

<div class="board-header">
  <img class="brand-logo" id="logoLeft"  alt="">
  <div class="board-title">Order Status</div>
  <img class="brand-logo" id="logoRight" alt="">
  <div class="header-time" id="headerTime"></div>
  <div class="header-store-name" id="headerStoreName"></div>
</div>

<div class="board-body">
  <!-- Received -->
  <div class="col">
    <div class="col-header">
      <span class="col-icon">📨</span>
      <span class="col-title">Received</span>
    </div>
    <div class="col-names" id="colWaiting"></div>
  </div>

  <!-- In Progress -->
  <div class="col">
    <div class="col-header">
      <span class="col-icon">🏃</span>
      <span class="col-title">In Progress</span>
    </div>
    <div class="col-names" id="colProgress"></div>
  </div>

  <!-- Ready -->
  <div class="col">
    <div class="col-header">
      <span class="col-icon">🛍️</span>
      <span class="col-title">Ready</span>
    </div>
    <div class="col-names" id="colReady"></div>
  </div>
</div>

<div class="board-footer" id="boardFooter"></div>

<script type="module">
import { initializeApp }                                from "https://www.gstatic.com/firebasejs/12.9.0/firebase-app.js";
import { getFirestore, collection, query, where,
         onSnapshot, updateDoc, doc }                   from "https://www.gstatic.com/firebasejs/12.9.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey:            "AIzaSyDrUKPNep2uxbZjYJ4i0vImdG7Xn_UuSXo",
  authDomain:        "rob-ph-demos.firebaseapp.com",
  projectId:         "rob-ph-demos",
  storageBucket:     "rob-ph-demos.firebasestorage.app",
  messagingSenderId: "199417645406",
  appId:             "1:199417645406:web:0e7a54d00083b41ea9e7cf"
};
const app = initializeApp(firebaseConfig);
const db  = getFirestore(app);

const urlParams  = new URLSearchParams(window.location.search);
const STORE_CODE  = (urlParams.get('store')  || '').trim().toUpperCase();
const DEVICE_UDID = (urlParams.get('device') || '').trim();
const MB = 'menuboard';

// ── DEBUG PANEL VISIBILITY + LONG-PRESS TRIGGER ───────────────────────────────
let _debugPanelVisible = (urlParams.get('debug') === '1');
{
  let _lpt = null;
  const _CP = 120, _HM = 800;
  const _isBL = (x, y) => x <= _CP && y >= window.innerHeight - _CP;
  document.addEventListener('mousedown', e => {
    if (!_isBL(e.clientX, e.clientY)) return;
    _lpt = setTimeout(() => { _debugPanelVisible = !_debugPanelVisible; _updateDebugPanel(); }, _HM);
  });
  document.addEventListener('mouseup', () => { clearTimeout(_lpt); _lpt = null; });
  document.addEventListener('touchstart', e => {
    const t = e.touches[0];
    if (!_isBL(t.clientX, t.clientY)) return;
    _lpt = setTimeout(() => { _debugPanelVisible = !_debugPanelVisible; _updateDebugPanel(); }, _HM);
  }, { passive: true });
  document.addEventListener('touchend', () => { clearTimeout(_lpt); _lpt = null; }, { passive: true });
}

// ── CLOCK ──────────────────────────────────────────────────────────────────
function updateClock() {
  const n = new Date();
  const timeStr = n.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
  const dateStr = n.toLocaleDateString([], { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  document.getElementById('headerTime').textContent = timeStr + '\u00a0\u00a0·\u00a0\u00a0' + dateStr;
}
updateClock();
setInterval(updateClock, 1000);

if (!STORE_CODE) {
  document.body.innerHTML = `
    <div class="no-store">
      <h1>Order Status</h1>
      <p>Add <code>?store=YOUR_CODE</code> to the URL to get started</p>
    </div>`;
}

// ── BRAND LOGOS ────────────────────────────────────────────────────────────
onSnapshot(doc(db, MB, 'brands'), snap => {
  const brands = snap.exists() ? (snap.data().data || []) : [];
  const logo = brands[0]?.logo || '';
  ['logoLeft', 'logoRight'].forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    if (logo) { el.src = logo; el.style.display = 'block'; }
    else       { el.style.display = 'none'; }
  });
});

// ── PH API — STORE NAME ────────────────────────────────────────────────────
let _settings = {};

const _ENC_PASS = 'rob-ph-demos-phapi-v1';
const _ENC_SALT = new TextEncoder().encode('ph-menuboard-salt-2024');
let _derivedKeyPromise = null;
async function _deriveKey() {
  if (!_derivedKeyPromise) {
    _derivedKeyPromise = (async () => {
      const mat = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(_ENC_PASS), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: _ENC_SALT, iterations: 100000, hash: 'SHA-256' },
        mat, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    })();
  }
  return _derivedKeyPromise;
}

let _tokenCache = { b64: null, plain: null };
async function decryptToken(b64) {
  if (_tokenCache.b64 === b64) return _tokenCache.plain;
  const key   = await _deriveKey();
  const buf   = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const pt    = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, key, buf.slice(12));
  const plain = new TextDecoder().decode(pt);
  _tokenCache = { b64, plain };
  return plain;
}

// ── ENDPOINT PREFERENCE (shared localStorage key with menu-board.html) ────────
function _epPrefKey()            { return `ph-ep-${DEVICE_UDID}`; }
function _loadPreferredBaseUrl() { try { return localStorage.getItem(_epPrefKey()) || null; } catch (_) { return null; } }
function _savePreferredBaseUrl(url) {
  try { url ? localStorage.setItem(_epPrefKey(), url) : localStorage.removeItem(_epPrefKey()); } catch (_) {}
}
function _getActiveEndpoint() {
  const endpoints = _settings?.phApi?.endpoints;
  if (Array.isArray(endpoints) && endpoints.length > 0) {
    const preferred = _loadPreferredBaseUrl();
    if (preferred) { const ep = endpoints.find(e => e.baseUrl === preferred); if (ep) return ep; }
    return endpoints[0];
  }
  // Legacy single-endpoint fallback
  const phApi = _settings?.phApi;
  if (phApi?.baseUrl && phApi?.authToken) return { baseUrl: phApi.baseUrl, authToken: phApi.authToken };
  return null;
}

let _storeName = null;  // from PH API store_location.store_name

async function pollStoreName() {
  if (!DEVICE_UDID) return;
  const ep = _getActiveEndpoint();
  if (!ep) return;
  try {
    const token = await decryptToken(ep.authToken);
    const url   = `${ep.baseUrl}/location-api/device/${DEVICE_UDID}/campaign_data`;
    const resp  = await fetch(url, { headers: { accept: 'application/json', 'x-api-key': token } });
    if (!resp.ok) { console.warn(`[StoreData] API returned HTTP ${resp.status}`); return; }
    const json  = await resp.json();
    const name  = (json?.data?.store_location?.store_name || '').trim() || null;
    if (name !== _storeName) {
      _storeName = name;
      const el = document.getElementById('headerStoreName');
      if (el) el.textContent = _storeName || '';
    }
    _updateDebugPanel();
  } catch (e) {
    console.warn('[StoreData] poll failed:', e);
  }
}

function _updateDebugPanel() {
  const el = document.getElementById('debugPanel');
  if (!el) return;
  if (!_debugPanelVisible) { el.classList.remove('visible'); return; }
  const ep        = _getActiveEndpoint();
  const activeUrl = ep?.baseUrl || null;
  const endpoints = Array.isArray(_settings?.phApi?.endpoints) ? _settings.phApi.endpoints : [];
  const esc = s => String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  const deviceHtml = DEVICE_UDID
    ? `<span class="ok">✓ ${esc(DEVICE_UDID)}</span>`
    : `<span class="err">✗ NOT SET — add ?device=UDID to URL</span>`;
  const apiHtml = activeUrl
    ? `<span class="ok">✓ ${esc(activeUrl)}</span>`
    : `<span class="warn">⚠ Not configured</span>`;
  const envBtns = endpoints.length > 1 ? endpoints.map(e => {
    let host = e.baseUrl; try { host = new URL(e.baseUrl).hostname; } catch (_) {}
    const active = e.baseUrl === activeUrl;
    const safe   = e.baseUrl.replace(/\\/g, '\\\\').replace(/'/g, "\\'");
    return `<button class="env-btn${active ? ' active' : ''}" onclick="window._switchEndpoint('${safe}')">${active ? '✓ ' : ''}${esc(host)}</button>`;
  }).join('') : '';
  el.innerHTML =
    `<div><b>🛠 PH API</b></div>` +
    `<div>Device UDID : ${deviceHtml}</div>` +
    `<div>Active API  : ${apiHtml}</div>` +
    (envBtns ? `<div>Environment : ${envBtns}</div>` : '') +
    `<div>Store name  : ${_storeName ? `<span class="ok">"${esc(_storeName)}"</span>` : '<span class="warn">none</span>'}</div>`;
  el.classList.add('visible');
}
window._switchEndpoint = function(baseUrl) {
  _savePreferredBaseUrl(baseUrl);
  pollStoreName();
  _updateDebugPanel();
};

if (DEVICE_UDID) {
  _deriveKey();  // warm up key derivation immediately
  setInterval(pollStoreName, 5000);
}

onSnapshot(doc(db, MB, 'settings'), snap => {
  _settings = snap.exists() ? snap.data() : {};
  if (DEVICE_UDID) pollStoreName();
  _updateDebugPanel();
});

// ── DATA ───────────────────────────────────────────────────────────────────
let _orders = {};

const TRANSITION_MS = {
  'waiting':     10 * 1000,   // → in-progress after 10 s
  'in-progress': 30 * 1000,   // → ready after 30 s more (T+40 s total)
};
const CLEAR_AFTER_MS = 80 * 1000;  // remove from board 80 s after ready (T+2 min total)

// ── AUTO-ADVANCE TIMER ─────────────────────────────────────────────────────
setInterval(() => {
  const now = Date.now();
  Object.entries(_orders).forEach(([id, order]) => {
    if (!order.queueEnteredAt) return;
    const entered = new Date(order.queueEnteredAt).getTime();
    const elapsed = now - entered;

    if (order.queueStatus === 'waiting' && elapsed >= TRANSITION_MS['waiting']) {
      order.queueStatus = 'in-progress';
      updateDoc(doc(db, 'carts', id), { queueStatus: 'in-progress' })
        .catch(e => console.warn('[Queue] transition failed:', e));
    } else if (order.queueStatus === 'in-progress' && elapsed >= TRANSITION_MS['waiting'] + TRANSITION_MS['in-progress']) {
      order.queueStatus = 'ready';
      updateDoc(doc(db, 'carts', id), { queueStatus: 'ready' })
        .catch(e => console.warn('[Queue] transition failed:', e));
    } else if (order.queueStatus === 'ready' && elapsed >= TRANSITION_MS['waiting'] + TRANSITION_MS['in-progress'] + CLEAR_AFTER_MS) {
      order.queueStatus = null;
      updateDoc(doc(db, 'carts', id), { queueStatus: null })
        .catch(e => console.warn('[Queue] clear failed:', e));
    }
  });
  renderBoard();
}, 2000);

// ── RENDER ─────────────────────────────────────────────────────────────────
function renderBoard() {
  const cols = { waiting: [], 'in-progress': [], ready: [] };
  Object.values(_orders).forEach(o => {
    if (o.queueStatus && cols[o.queueStatus]) cols[o.queueStatus].push(o);
  });
  Object.values(cols).forEach(arr =>
    arr.sort((a, b) => (a.queueEnteredAt || '').localeCompare(b.queueEnteredAt || '')));

  renderCol(cols['waiting'],     'colWaiting');
  renderCol(cols['in-progress'], 'colProgress');
  renderCol(cols['ready'],       'colReady');
  adjustFontSize();
}

function renderCol(orders, colId) {
  const el = document.getElementById(colId);
  el.innerHTML = orders.map(o => {
    const firstName   = o.customerName ? escHtml(o.customerName.trim().split(/\s+/)[0]) : '';
    const displayName = firstName || (o.orderNumber ? `#${escHtml(String(o.orderNumber))}` : '—');
    return `<div class="name-row">${displayName}</div>`;
  }).join('');
}

// ── DYNAMIC FONT SCALING ───────────────────────────────────────────────────
// Uses calculation rather than scrollHeight (flex overflow:hidden returns
// scrollHeight === clientHeight even when content overflows).
function adjustFontSize() {
  const MIN_SIZE     = 18;
  const DEFAULT_SIZE = 42;
  const LINE_H       = 1.15;  // matches CSS line-height on .name-row
  const GAP          = 4;     // matches CSS gap in .col-names

  const colEls   = ['colWaiting', 'colProgress', 'colReady'].map(id => document.getElementById(id));
  const maxCount = Math.max(1, ...colEls.map(c => c.children.length));
  const colH     = colEls[0].clientHeight || 300;
  const padding  = 32;  // 16px top + 16px bottom from .col-names padding

  // Solve: available >= maxCount × (size × LINE_H + GAP)
  const available = colH - padding;
  let size = Math.floor((available / maxCount - GAP) / LINE_H);
  size = Math.max(MIN_SIZE, Math.min(DEFAULT_SIZE, size));

  const root = document.documentElement.style;
  root.setProperty('--name-size', size + 'px');
  root.setProperty('--header-size', Math.max(13, Math.round(size * 0.43)) + 'px');
}

// ── HELPERS ────────────────────────────────────────────────────────────────
function escHtml(str) {
  return String(str)
    .replace(/&/g, '&amp;').replace(/</g, '&lt;')
    .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ── FIRESTORE LISTENER ─────────────────────────────────────────────────────
if (STORE_CODE) {
  const q = query(
    collection(db, 'carts'),
    where('storeCode', '==', STORE_CODE)
  );
  onSnapshot(q, snap => {
    snap.docs.forEach(d => {
      const data = d.data();
      if (data.queueStatus) {
        _orders[d.id] = {
          orderNumber:    data.orderNumber || null,
          customerName:   data.customerName || '',
          queueStatus:    data.queueStatus,
          queueEnteredAt: data.queueEnteredAt || null,
          items:          data.items || []
        };
      } else {
        delete _orders[d.id];
      }
    });
    renderBoard();
  });
}
</script>
<div id="debugPanel"></div>
</body>
</html>
