<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Offer Board</title>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --green:            #006241;
      --green-dark:       #004d33;
      --green-light:      #d4edda;
      --cream:            #f9f4ec;
      --cream2:           #f0e9dc;
      --white:            #ffffff;
      --text:             #1a1a1a;
      --text2:            #444444;
      --border:           #d4c8b8;
      --border-lt:        #e8dfd3;
      --danger:           #c0392b;
      --board-header-bg:  #ffffff;
      --cat-bar-bg:       #006241;
      --price-color:      #004d33;
      --item-color:       #004d33;  /* item name text — set from colors.text */
      --item-text:        #1a1a1a;  /* hero item name text — set from colors.text */
      --item-bg:          #ffffff;  /* item card background */
      --item-desc:        #444444;  /* short description / secondary item text */
      --header-text:      #006241;
      --clock-text:       #1e293b;
      --clock-bg:         #f0f4f8;  /* clock bar background */
      --accent:           #006241;  /* explicit accent var (mirrors --green) */
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
      background: var(--cream);
      color: var(--text);
      font-family: 'Inter', sans-serif;
    }

    /* ── BOARD WRAPPER ─────────────────────── */
    .board {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
      background: var(--cream);
    }

    /* ── HEADER ────────────────────────────── */
    .board-header {
      background: var(--board-header-bg, #ffffff);
      border-bottom: 3px solid var(--green);
      padding: clamp(14px, 2.5vw, 36px) clamp(20px, 4vw, 60px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-shrink: 0;
    }

    /* Portrait: bigger header padding */
    .board.portrait .board-header {
      padding: clamp(18px, 3vw, 48px) clamp(24px, 4.5vw, 70px);
    }

    .header-logo-wrap {
      width: clamp(64px, 9vw, 130px);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .header-logo-wrap img {
      max-width: 100%;
      max-height: clamp(60px, 8vw, 120px);
      object-fit: contain;
    }
    .header-logo-wrap.no-logo {
      width: clamp(64px, 9vw, 130px);
    }

    .header-center {
      flex: 1;
      text-align: center;
      color: var(--header-text);
    }
    .header-brand {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(20px, 4vw, 56px);
      font-weight: 700;
      letter-spacing: clamp(2px, 0.5vw, 8px);
      text-transform: uppercase;
      line-height: 1.1;
      color: var(--header-text);
    }
    .board.portrait .header-brand {
      font-size: clamp(28px, 5vw, 72px);
    }
    .header-menu-type {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(14px, 2.5vw, 36px);
      font-weight: 500;
      letter-spacing: clamp(3px, 0.8vw, 12px);
      text-transform: uppercase;
      color: var(--header-text);
      margin-top: clamp(2px, 0.4vw, 6px);
    }
    .board.portrait .header-menu-type {
      font-size: clamp(18px, 3vw, 44px);
    }

    /* ── CLOCK BAR ─────────────────────────── */
    .clock-bar {
      background: var(--clock-bg, #f0f4f8);
      border-top: 1px solid var(--clock-bg, #dde5ee);
      border-bottom: 1px solid var(--clock-bg, #dde5ee);
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: clamp(6px, 1vw, 12px) clamp(20px, 4vw, 60px);
      flex-shrink: 0;
    }
    .board.portrait .clock-bar {
      padding: clamp(10px, 1.5vw, 20px) clamp(24px, 4.5vw, 70px);
    }
    .board.landscape .clock-bar {
      padding: clamp(8px, 1vw, 14px) clamp(20px, 4vw, 60px);
    }
    .clock-bar .store-label {
      font-size: clamp(10px, 1.1vw, 14px);
      font-weight: 700;
      color: #64748b;
      letter-spacing: 1.5px;
      text-transform: uppercase;
    }
    .clock-bar .time-display {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(15px, 1.8vw, 26px);
      color: var(--clock-text, #1e293b);
      letter-spacing: 1px;
    }
    .board.landscape .clock-bar .time-display {
      font-size: clamp(20px, 2.4vw, 38px);
      letter-spacing: 1.5px;
    }
    .clock-bar .greeting-text {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(18px, 2.1vw, 31px);
      font-weight: 700;
      color: var(--clock-text, #1e293b);
      letter-spacing: 1.5px;
      text-transform: uppercase;
      margin-right: auto; /* pushes .time-display to the far right */
    }
    .board.landscape .clock-bar .greeting-text {
      font-size: clamp(25px, 3.1vw, 48px);
    }
    /* Mock-mode badge — visible only when ?mockapi= is set in the URL */
    .mock-badge {
      font-family: 'Oswald', monospace;
      font-size: 11px;
      font-weight: 700;
      background: #f59e0b;
      color: #000;
      padding: 2px 7px;
      border-radius: 4px;
      margin-right: 10px;
      letter-spacing: 1px;
      vertical-align: middle;
      flex-shrink: 0;
    }

    /* ── ITEMS SECTION ─────────────────────── */
    .board-body {
      flex: 1;
      min-height: 0;
      overflow: hidden;
      background: var(--cream);
    }

    /* Category section label — kept for colour-scheme compatibility but hidden */
    .cat-header { display: none; }

    /* Per-tile category badge — now lives in .item-meta-bar (right-aligned) */
    .item-cat-badge {
      display: inline-block;
      background: var(--cat-bar-bg, var(--green));
      color: rgba(255,255,255,0.95);
      font-size: clamp(7px, 0.7vw, 10px);
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      padding: clamp(1px, 0.2vw, 3px) clamp(5px, 0.6vw, 9px);
      border-radius: 3px;
      white-space: nowrap;
      max-width: 50%;
      overflow: hidden;
      text-overflow: ellipsis;
      flex-shrink: 0;
    }
    .board.portrait .item-cat-badge {
      font-size: clamp(9px, 1.1vw, 13px);
      padding: clamp(2px, 0.4vw, 5px) clamp(7px, 1vw, 12px);
      border-radius: 4px;
    }

    /* Default grid (landscape, 5 cols) */
    .items-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      height: 100%;
    }

    /* Portrait: 3-column grid */
    .board.portrait .items-grid {
      grid-template-columns: repeat(3, 1fr);
    }

    /* Landscape: 5-column grid (explicit, same as default) */
    .board.landscape .items-grid {
      grid-template-columns: repeat(5, 1fr);
    }

    /* Single item cell */
    .item-cell {
      display: flex;
      flex-direction: row;
      align-items: stretch;
      border-bottom: 1px solid var(--border);
      border-right: 1px solid var(--border);
      background: var(--item-bg, var(--white));
      position: relative;
      min-height: 0;
      overflow: hidden;
    }
    .board.landscape .item-cell {
      min-height: 120px;
    }

    /* Portrait: vertical card layout — image on top, text below */
    .board.portrait .item-cell {
      flex-direction: column;
    }

    /* Border-right removal for last in row */
    .board.portrait .item-cell:nth-child(3n) { border-right: none; }
    .board.landscape .item-cell:nth-child(5n) { border-right: none; }
    /* Default (5 cols) */
    .item-cell:nth-child(5n) { border-right: none; }

    .item-cell.oos-cell { background: #fdf8f5; }

    /* Thumbnail — LEFT side (landscape) / TOP (portrait) */
    .item-thumb {
      width: clamp(60px, 7vw, 100px);
      flex-shrink: 0;
      position: relative;
      overflow: hidden;
      background: #f5f0e8;
      order: 0;
    }
    /* Portrait: full-width image strip at top of cell — use flex to allocate ~45% */
    .board.portrait .item-thumb {
      width: 100%;
      flex: 0 0 45%;
      min-height: 0;      /* allow flex % to govern — no fixed floor that swamps small cells */
      max-height: 220px;
    }
    .board.landscape .item-thumb {
      width: clamp(60px, 7vw, 100px);
    }
    .item-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }
    .item-thumb-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(16px, 2.5vw, 32px);
      color: var(--border);
    }

    /* Right-side column wrapper (meta bar + text, stacked vertically) */
    .item-right {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }

    /* Meta bar: price left, category badge right — sits between image and text */
    .item-meta-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
      padding: clamp(4px, 0.5vw, 8px) clamp(8px, 1.2vw, 16px);
      background: var(--cream2, #f0e9dc);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .board.portrait .item-meta-bar {
      padding: clamp(6px, 1vw, 12px) clamp(10px, 1.5vw, 18px);
    }

    /* Text portion — holds item name + nutrition only */
    .item-text {
      flex: 1;
      padding: clamp(6px, 1vw, 14px) clamp(8px, 1.3vw, 18px);
      display: flex;
      flex-direction: column;
      justify-content: flex-start;
      min-width: 0;
      min-height: 0;
      overflow: hidden;
    }
    .board.portrait .item-text {
      padding: clamp(8px, 1.5vw, 18px) clamp(10px, 1.8vw, 20px);
    }
    .item-name {
      font-size: clamp(11px, 1.25vw, 17px);
      font-weight: 700;
      color: var(--item-color);
      line-height: 1.3;
      margin-bottom: clamp(4px, 0.5vw, 8px);
    }
    .board.portrait .item-name {
      font-size: clamp(12px, 2.1vw, 24px);
      margin-bottom: clamp(3px, 0.5vw, 6px);
    }

    /* Nutrition block */
    .nutrition-block {
      margin-top: clamp(2px, 0.3vw, 4px);
    }
    .nutr-row {
      display: flex;
      align-items: baseline;
      gap: 3px;
    }
    .nutr-val {
      font-size: clamp(11px, 1.2vw, 16px);
      font-weight: 800;
      color: var(--item-color);
      line-height: 1;
    }
    .nutr-unit {
      font-size: clamp(8px, 0.85vw, 11px);
      color: var(--item-desc, var(--text2));
      font-weight: 500;
    }
    /* Calories row — full width above macros */
    .nutr-calories {
      display: flex;
      align-items: baseline;
      gap: 3px;
      margin-bottom: clamp(2px, 0.3vw, 4px);
    }
    .nutr-calories .nutr-val {
      font-size: clamp(14px, 1.6vw, 22px);
      color: var(--item-color);
    }
    .nutr-calories .nutr-unit {
      font-size: clamp(9px, 1vw, 13px);
      color: var(--item-color);
    }
    /* Macros row — fat, carbs, protein side by side */
    .nutr-macros-row {
      display: flex;
      flex-direction: row;
      flex-wrap: nowrap;
      gap: clamp(5px, 0.7vw, 12px);
      align-items: baseline;
    }
    /* Portrait: scale up nutrition */
    .board.portrait .nutr-val {
      font-size: clamp(12px, 1.8vw, 20px);
    }
    .board.portrait .nutr-unit {
      font-size: clamp(9px, 1.2vw, 14px);
    }
    .board.portrait .nutr-calories .nutr-val {
      font-size: clamp(15px, 2.2vw, 26px);
    }
    .board.portrait .nutr-calories .nutr-unit {
      font-size: clamp(10px, 1.4vw, 16px);
    }

    /* Item price — lives in .item-meta-bar */
    .item-price {
      font-size: clamp(15px, 1.8vw, 24px);
      font-weight: 800;
      color: var(--price-color, var(--green-dark));
      letter-spacing: -0.3px;
      line-height: 1;
    }
    .board.portrait .item-price {
      font-size: clamp(16px, 2.8vw, 32px);
    }

    /* ── OUT OF STOCK ───────────────────────── */
    .oos-overlay {
      display: none;
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.65);
      align-items: center;
      justify-content: center;
      z-index: 4;
    }
    .item-cell.oos-cell .oos-overlay { display: flex; }

    .oos-stamp {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      border: clamp(2px, 0.3vw, 3px) solid var(--danger);
      border-radius: 4px;
      padding: clamp(4px, 0.5vw, 8px) clamp(8px, 1.2vw, 18px);
      transform: rotate(-12deg);
      background: rgba(255,255,255,0.9);
      box-shadow: 0 2px 10px rgba(192,57,43,0.25);
    }
    .oos-stamp-text {
      font-family: 'Oswald', sans-serif;
      font-size: clamp(9px, 1.1vw, 14px);
      font-weight: 700;
      color: var(--danger);
      letter-spacing: clamp(1px, 0.3vw, 4px);
      text-transform: uppercase;
      line-height: 1.1;
    }

    /* ── FOOTER ────────────────────────────── */
    .board-footer {
      background: #f0f4f8;
      border-top: 1px solid #dde5ee;
      padding: clamp(8px, 1.2vw, 16px) clamp(20px, 4vw, 60px);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.4s ease;
    }
    .board:hover .board-footer {
      opacity: 1;
    }
    .board.landscape .board-footer {
      padding: clamp(5px, 0.8vw, 10px) clamp(20px, 4vw, 60px);
    }
    .footer-text {
      font-size: clamp(9px, 1vw, 13px);
      color: #64748b;
      font-weight: 500;
      letter-spacing: 0.5px;
    }
    .footer-page-info {
      font-size: clamp(9px, 1vw, 13px);
      color: #64748b;
      font-weight: 600;
      letter-spacing: 0.5px;
    }
    .footer-refresh {
      font-size: clamp(9px, 0.9vw, 12px);
      color: #94a3b8;
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .refresh-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #4ade80;
      animation: pulse 2s infinite;
    }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.2} }

    /* ── ROTATION PROGRESS BAR ──────────────── */
    .rotation-bar-wrap {
      height: 3px;
      background: rgba(0,0,0,0.06);
      overflow: hidden;
      flex-shrink: 0;
    }
    .rotation-bar {
      height: 100%;
      background: var(--green, #006241);
      width: 0%;
      transition: none;
    }

    /* ── EMPTY / ERROR STATES ──────────────── */
    .board-empty {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 80px 32px;
      text-align: center;
      background: var(--cream);
    }
    .board-empty .icon { font-size: 56px; margin-bottom: 20px; opacity: 0.35; }
    .board-empty h2 { font-family: 'Oswald',sans-serif; font-size: 28px; color: var(--green); margin-bottom: 10px; }
    .board-empty p  { font-size: 15px; color: var(--text2); line-height: 1.7; }

    .error-board {
      min-height: 100vh;
      background: var(--green);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px;
      text-align: center;
      color: white;
    }
    .error-board .icon { font-size: 60px; margin-bottom: 20px; }
    .error-board h2 { font-family: 'Oswald',sans-serif; font-size: 32px; margin-bottom: 12px; letter-spacing: 2px; }
    .error-board p  { font-size: 15px; color: rgba(255,255,255,0.75); line-height: 1.7; max-width: 440px; }
    .error-board code {
      background: rgba(255,255,255,0.15); border-radius: 6px;
      padding: 3px 10px; font-size: 13px; font-family: monospace;
      color: #fff; display: inline-block; margin-top: 6px; word-break: break-all;
    }
    .error-board a {
      display: inline-flex; align-items: center; gap: 8px;
      margin-top: 24px; background: white; color: var(--green);
      font-weight: 700; padding: 10px 24px; border-radius: 8px;
      text-decoration: none; font-size: 14px;
    }

    /* ── FEATURE HERO SPOTLIGHT LAYOUT ─────────────── */
    /* Portrait: hero stacked above the grid */
    .board.portrait .hero-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .board.portrait .hero-slot {
      flex: 0 0 42%;
      display: flex;
      flex-direction: row;
      overflow: hidden;
      border-bottom: 3px solid var(--accent, #f6ad55);
    }
    .board.portrait .hero-slot .hero-img {
      flex: 0 0 42%;
      overflow: hidden;
    }
    .board.portrait .hero-slot .hero-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .board.portrait .hero-slot .hero-info {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      padding: clamp(16px, 2.5vw, 40px);
      overflow: hidden;
    }
    /* Landscape: hero left panel, grid right panel */
    .board.landscape .hero-body {
      flex: 1;
      min-height: 0;
      display: flex;
      flex-direction: row;
      overflow: hidden;
    }
    .board.landscape .hero-slot {
      flex: 0 0 42%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      border-right: 3px solid var(--accent, #f6ad55);
      position: relative;
    }
    .board.landscape .hero-slot .hero-img {
      flex: 1;
      overflow: hidden;
    }
    .board.landscape .hero-slot .hero-img img {
      width: 100%; height: 100%; object-fit: cover;
    }
    .board.landscape .hero-slot .hero-info {
      position: absolute;
      bottom: 0; left: 0; right: 0;
      padding: clamp(12px, 2vw, 28px);
      background: linear-gradient(to top, rgba(0,0,0,0.85) 0%, rgba(0,0,0,0) 100%);
    }
    /* Shared hero info text */
    .hero-badge {
      display: inline-block;
      background: var(--accent, #f6ad55);
      color: #111;
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      font-size: clamp(10px, 1.1vw, 16px);
      letter-spacing: .08em;
      text-transform: uppercase;
      padding: 3px 10px;
      border-radius: 4px;
      margin-bottom: clamp(6px, 1vw, 14px);
    }
    .hero-name {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      color: var(--item-text, var(--text, #ffffff));
      font-size: clamp(20px, 3vw, 52px);
      line-height: 1.15;
      margin-bottom: clamp(4px, 0.6vw, 10px);
    }
    .hero-price {
      font-family: 'Oswald', sans-serif;
      font-weight: 700;
      color: var(--accent, #f6ad55);
      font-size: clamp(24px, 3.6vw, 62px);
    }
    .hero-desc {
      color: var(--item-desc, rgba(255,255,255,0.72));
      font-size: clamp(10px, 1.2vw, 17px);
      line-height: 1.45;
      margin-top: clamp(4px, 0.6vw, 10px);
      display: -webkit-box;
      -webkit-line-clamp: 3;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    /* Grid within hero layout */
    .hero-grid-wrap {
      flex: 1;
      min-width: 0;
      min-height: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .hero-grid-wrap .board-body {
      flex: 1;
      min-height: 0;
    }
    /* Portrait grid strip below hero */
    .board.portrait .hero-grid-wrap {
      flex: 1;
    }
    /* No image placeholder for hero */
    .hero-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      font-size: clamp(48px, 8vw, 120px);
      background: rgba(255,255,255,0.05);
    }

    /* ── API ERROR BADGE ───────────────────────────── */
    #apiErrorBadge {
      position: fixed; bottom: 16px; right: 16px; z-index: 9999;
      background: rgba(192,57,43,0.92); color: #fff;
      font-family: 'Inter', sans-serif; font-size: 11px; font-weight: 600;
      line-height: 1.4; padding: 8px 12px; border-radius: 6px;
      max-width: 320px; word-break: break-all;
      box-shadow: 0 2px 12px rgba(0,0,0,0.3);
      display: none; pointer-events: none;
    }
    #apiErrorBadge.visible { display: block; }

    /* ── DEBUG PANEL (visible only with ?debug=1) ──── */
    #debugPanel {
      position: fixed; bottom: 12px; left: 12px; z-index: 9999;
      background: rgba(0,0,0,0.88); color: #ccc;
      font-family: 'Courier New', monospace; font-size: 11.5px; font-weight: 500;
      line-height: 1.8; padding: 10px 14px; border-radius: 8px;
      max-width: 420px; word-break: break-all;
      box-shadow: 0 2px 20px rgba(0,0,0,0.6);
      display: none;
    }
    #debugPanel.visible { display: block; }
    #debugPanel b       { color: #fff; font-size: 12px; }
    #debugPanel .ok     { color: #2ecc71; }
    #debugPanel .warn   { color: #f39c12; }

// (null = "show all brands" mode). A separate themeSource is used for UI styling.
// If no brands in Firestore, returns a legacy compat object built from mb_settings.
function getActiveBrand() {
  const brands = getBrands();

  // No brands at all — legacy fallback from mb_settings
  if (!brands.length) {
    const s = getSettings();

      id: 'default',

    return found || brands[0]; // found brand, or first brand if name didn't match

  return null;
}

// Returns the active Offer Board template for the given brand.
// Matches TEMPLATE_TYPE URL param against brand.templates[].templateType.
// Falls back to the isDefault template, then first template, then null.
function getActiveTemplate(brand) {
  if (!brand) return null;
  const templates = brand.templates;
  if (!Array.isArray(templates) || !templates.length) return null;
  if (TEMPLATE_TYPE) {
    const match = templates.find(t => t.templateType === TEMPLATE_TYPE);
    if (match) return match;
  }
  return templates.find(t => t.isDefault) || templates[0];
}

// ── CLOCK ────────────────────────────────────────────────────────────────────
function updateClock() {
  const el = document.getElementById('clockDisplay');
  if (!el) return;
  const fmt = _effectiveTimeFormat;
  const n      = new Date();

  let timeStr, dateStr;
  if (fmt === 'us') {
    timeStr = n.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', hour12: true });
    dateStr = n.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  } else if (fmt === 'british') {
    timeStr = n.toLocaleTimeString('en-GB', { hour: '2-digit', minute: '2-digit', hour12: false });
    dateStr = n.toLocaleDateString('en-GB', { weekday: 'short', day: 'numeric', month: 'short', year: 'numeric' });
  } else {
    // Default: use original system-locale formatting (no seconds — same as before)
    timeStr = fmtTime(n);
    dateStr = fmtDate(n);
  }
  el.textContent = timeStr + '  ·  ' + dateStr;
}

// ── BUILD NUTRITION HTML ─────────────────────────────────────────────────────
function buildNutrition(item) {
  const hasCal  = item.calories != null;
  const hasFat  = item.fat      != null;
  const hasCarb = item.carbs    != null;
  const hasProt = item.protein  != null;

  if (!hasCal && !hasFat && !hasCarb && !hasProt) return '';

  let html = '<div class="nutrition-block">';

  if (hasCal) {
    html += `<div class="nutr-calories">
      <span class="nutr-val">${item.calories}</span>
      <span class="nutr-unit">&nbsp;Calories</span>
    </div>`;
  }

  const macros = [];
  if (hasFat)  macros.push(`<span class="nutr-val">${item.fat}</span><span class="nutr-unit">g&nbsp;Fat</span>`);
  if (hasCarb) macros.push(`<span class="nutr-val">${item.carbs}</span><span class="nutr-unit">g&nbsp;Carbs</span>`);
  if (hasProt) macros.push(`<span class="nutr-val">${item.protein}</span><span class="nutr-unit">g&nbsp;Prot</span>`);

  if (macros.length) {
    html += `<div class="nutr-macros-row">${macros.map(m => `<div class="nutr-row">${m}</div>`).join('')}</div>`;
  }

  html += '</div>';
  return html;
}

  el.innerHTML =

    `<div>PH API      : ${apiHtml}</div>` +
    switcherHtml +
    `<div>Last poll   : ${pollHtml}</div>` +
    `<div>Store name  : ${storeHtml}</div>` +
    `<div>Raw API SKU : ${rawHtml}</div>` +
    `<div>First name  : ${nameHtml}</div>` +
    `<div>SKUs parsed : ${skuHtml}</div>` +

// Exposed on window so debug-panel onclick attributes can call it from module scope

// ── LONG-PRESS BOTTOM-LEFT to toggle debug panel ───────────────────────────
{
  let _lpt = null;
  const _CP = 120, _HM = 800;
  const _isBL = (x, y) => x <= _CP && y >= window.innerHeight - _CP;

function startRotation(totalPages) {
  if (SCREEN_LOCK || totalPages <= 1) return;
  clearTimeout(rotationTimer);

  // Animate progress bar from 0 → 100%
  const bar = document.getElementById('rotationBar');
  if (bar) {
    bar.style.transition = 'none';
    bar.style.width = '0%';
    setTimeout(() => {
      bar.style.transition = `width ${ROTATION_INTERVAL}ms linear`;
      bar.style.width = '100%';
    }, 50);
  }

  rotationTimer = setTimeout(() => {
    currentPage = currentPage >= totalPages ? 1 : currentPage + 1;
    render();
  }, ROTATION_INTERVAL);
}

// ── PERSONALISATION HUB API — DECRYPTION + CAMPAIGN POLLING ─────────────────
const _ENC_PASS = 'rob-ph-demos-phapi-v1';
const _ENC_SALT = new TextEncoder().encode('ph-menuboard-salt-2024');

// Cache the key derivation (PBKDF2 is intentionally slow — only do it once)
let _derivedKeyPromise = null;
async function _deriveKey() {
  if (!_derivedKeyPromise) {
    _derivedKeyPromise = (async () => {
      const mat = await crypto.subtle.importKey(
        'raw', new TextEncoder().encode(_ENC_PASS), 'PBKDF2', false, ['deriveKey']);
      return crypto.subtle.deriveKey(
        { name: 'PBKDF2', salt: _ENC_SALT, iterations: 100000, hash: 'SHA-256' },
        mat, { name: 'AES-GCM', length: 256 }, false, ['encrypt', 'decrypt']);
    })();
  }
  return _derivedKeyPromise;
}

// Map-based decrypt cache — handles N endpoints without thrashing
const _tokenCache = new Map(); // encrypted b64 → plaintext
async function decryptToken(b64) {
  if (_tokenCache.has(b64)) return _tokenCache.get(b64);
  const key   = await _deriveKey();
  const buf   = Uint8Array.from(atob(b64), c => c.charCodeAt(0));
  const pt    = await crypto.subtle.decrypt({ name: 'AES-GCM', iv: buf.slice(0, 12) }, key, buf.slice(12));
  const plain = new TextDecoder().decode(pt);
  _tokenCache.set(b64, plain);
  return plain;
}

// ── ACTIVE ENDPOINT + LOCALSTORAGE PREFERENCE ────────────────────────────────
let _activeEndpoint = null; // { baseUrl: string, token: string } — current working endpoint

function _epPrefKey()            { return `ph-ep-${DEVICE_UDID}`; }
function _loadPreferredBaseUrl() {
  try { return localStorage.getItem(_epPrefKey()) || null; } catch (_) { return null; }
}
function _savePreferredBaseUrl(url) {
  try { url ? localStorage.setItem(_epPrefKey(), url) : localStorage.removeItem(_epPrefKey()); }
  catch (_) {}
}

async function pollCampaign() {
  if (!DEVICE_UDID) return;
  try {
    let json = null;

    if (MOCK_API_FILE) {
      // ── MOCK MODE: bypass real API — load local JSON file instead ──────────
      const mockPath = MOCK_API_FILE === '1' ? './mock-ph-api.json' : `./${MOCK_API_FILE}`;
      console.log('[Campaign] \uD83E\uDDEA MOCK MODE — loading', mockPath);
      const resp = await fetch(mockPath);
      if (!resp.ok) { console.warn('[Campaign] Mock file not found:', mockPath); return; }
      json = await resp.json();

    } else {
      // ── REAL API MODE — multi-endpoint probe ─────────────────────────────────
      const endpoints = _settings.phApi?.endpoints;

      // Backwards compat: old single-token format or no config — wait until admin saves
      if (!Array.isArray(endpoints) || endpoints.length === 0) return;

      // Phase 1: try the cached active endpoint (avoids re-probing on every poll)
      if (_activeEndpoint) {
        const { baseUrl, token } = _activeEndpoint;
        try {
          const resp = await fetch(
            `${baseUrl}/location-api/device/${DEVICE_UDID}/campaign_data`,
            { headers: { accept: 'application/json', 'x-api-key': token } }
          );
          if (resp.ok) {
            _setApiError(null);
            json = await resp.json();
          } else {
            console.warn(`[Campaign] Active endpoint HTTP ${resp.status} \u2014 re-probing`);
            _activeEndpoint = null;
          }
        } catch (activeErr) {
          console.warn('[Campaign] Active endpoint unreachable:', activeErr.message, '\u2014 re-probing');
          _activeEndpoint = null;
        }
      }

      // Phase 2: probe all endpoints in preference order
      if (!json) {
        // Build probe order: localStorage-preferred first, then remaining in array order
        const preferred  = _loadPreferredBaseUrl();
        const probeOrder = [];
        if (preferred) {
          const prefEp = endpoints.find(e => e.baseUrl === preferred);
          if (prefEp) probeOrder.push(prefEp);
        }
        for (const ep of endpoints) {
          if (!probeOrder.some(p => p.baseUrl === ep.baseUrl)) probeOrder.push(ep);
        }

        let lastTriedUrl = '';
        for (const ep of probeOrder) {
          if (!ep.baseUrl || !ep.authToken) continue;
          let token;
          try { token = await decryptToken(ep.authToken); }
          catch (_) { console.warn('[Campaign] Decrypt failed for', ep.baseUrl); continue; }

          const url = `${ep.baseUrl}/location-api/device/${DEVICE_UDID}/campaign_data`;
          lastTriedUrl = ep.baseUrl;
          try {
            const resp = await fetch(url, { headers: { accept: 'application/json', 'x-api-key': token } });
            if (resp.ok) {
              _activeEndpoint = { baseUrl: ep.baseUrl, token };
              _savePreferredBaseUrl(ep.baseUrl);
              _setApiError(null);
              json = await resp.json();
              console.log('[Campaign] Using endpoint:', ep.baseUrl);
              break;
            } else {
              console.warn(`[Campaign] ${ep.baseUrl} \u2014 HTTP ${resp.status}`);
            }
          } catch (fetchErr) {
            console.warn(`[Campaign] ${ep.baseUrl} \u2014 ${fetchErr.message}`);
          }
        }

        if (!json) {
          _setApiError(`All configured API endpoints failed. Last tried: ${lastTriedUrl || 'none'}`);
          return;
        }
      }
    }

    // ── Parse visitor_customer — handle both store-level and display-level responses ──
    // Store-level pushes populate json.data.visitor_customer directly.
    // Display-level pushes (display_ids) may return the same structure, but as a
    // safeguard we also check json.data directly as a fallback path.
    const d  = json?.data;
    const vc = d?.visitor_customer;

    // Resolve first_name: try visitor_customer first, then data root
    const firstName = (vc?.first_name || d?.first_name || '').trim() || null;

    // Resolve store_name from store_location
    const storeName = (d?.store_location?.store_name || '').trim() || null;

    // Resolve SKUs: try visitor_customer first, then data root
    // Filter out empty/blank strings that can appear in sparse API payloads
    // API may return field as "SKUs" (prompt schema) or "skus" (actual response) — handle both
    // Record the raw key/value for the debug panel
    if      (Array.isArray(vc?.SKUs)) { _dbgRawSkuKey = 'vc.SKUs'; _dbgRawSkuVal = vc.SKUs; }
    else if (Array.isArray(vc?.skus)) { _dbgRawSkuKey = 'vc.skus'; _dbgRawSkuVal = vc.skus; }
    else if (Array.isArray(d?.SKUs))  { _dbgRawSkuKey = 'd.SKUs';  _dbgRawSkuVal = d.SKUs;  }
    else if (Array.isArray(d?.skus))  { _dbgRawSkuKey = 'd.skus';  _dbgRawSkuVal = d.skus;  }
    else                              { _dbgRawSkuKey = null;       _dbgRawSkuVal = null;     }

    const rawSkus = _dbgRawSkuVal;
    const validSkus = rawSkus
      ? rawSkus.filter(e => typeof e === 'string' && e.trim() !== '')
      : null;
    const newSkus = (validSkus && validSkus.length > 0) ? validSkus : null;

    // Debug logging — visible in browser console; helps diagnose display-level issues
    console.log('[Campaign] visitor_customer:', JSON.stringify(vc));
    console.log('[Campaign] resolved \u2192 firstName:', firstName, '| SKUs:', newSkus, '| storeName:', storeName);

    const skusChanged      = JSON.stringify(newSkus) !== JSON.stringify(_campaignSkus);
    const nameChanged      = firstName !== _campaignFirstName;
    const storeNameChanged = storeName !== _storeName;

    _dbgLastPoll = Date.now();
    if (skusChanged || nameChanged || storeNameChanged) {
      _campaignSkus      = newSkus;
      _campaignFirstName = firstName;
      _storeName         = storeName;
      render();
    } else {
      _updateDebugPanel();   // refresh Last poll time even when nothing changed
    }
  } catch (e) {
    console.warn('[Campaign] poll failed:', e);
    _setApiError(`Poll error \u2014 ${e.message}`);
  }
}

// ── FIRESTORE LISTENERS ──────────────────────────────────────────────────────
onSnapshot(collection(db, ITEMS_COLL), snap => {
  const newItems = snap.docs.map(d => d.data()).sort((a, b) => (a.createdAt || '').localeCompare(b.createdAt || ''));
  const h = _itemsFp(newItems);
  if (h === _itemsHash) return;   // data unchanged — skip render to preserve rotation timer
  _itemsHash = h;
  _items = newItems;
  render();
});

onSnapshot(doc(db, MB, 'brands'), snap => {
  const newBrands = snap.exists() ? (snap.data().data || []) : [];
  const h = _fp(newBrands);
  if (h === _brandsHash) return;  // data unchanged — skip render
  _brandsHash = h;
  _brands = newBrands;
  const brand = getActiveBrand();
  const _titleBrand = brand || getBrands()[0];
  if (MENU_TYPE && MENU_META[MENU_TYPE]) {
    document.title = MENU_META[MENU_TYPE].label + (_titleBrand ? ' \u2014 ' + _titleBrand.name : ' \u2014 ' + STORE_CODE);
  }
  render();
  _pingBoardActivity(brand || _titleBrand);
});

onSnapshot(doc(db, MB, 'settings'), snap => {
  const newSettings = snap.exists() ? snap.data() : { brandName: 'Our Brand', currency: '$', logo: '', logoRight: '' };
  // Fix 1: only reset active endpoint when the endpoint list itself changes (preserves manual env selection)
  const endpointsChanged = JSON.stringify(_settings?.phApi?.endpoints)
                        !== JSON.stringify(newSettings?.phApi?.endpoints);
  const h = _fp(newSettings);
  _settings = newSettings;
  // Fix 2: only re-render when settings data actually changed
  if (h !== _settingsHash) {
    _settingsHash = h;
    render();
  }
  // Only force re-probe when endpoint config genuinely changed — not on every snapshot
  if (DEVICE_UDID && endpointsChanged) {
    _activeEndpoint = null;
    pollCampaign();
  }
});

// ── RENDER ───────────────────────────────────────────────────────────────────
function render() {
  if (!MENU_TYPE || (!STORE_CODE && !DEVICE_UDID)) return;
  const meta = MENU_META[MENU_TYPE];

  // brand = null means "no ?brand= param — show all brands"
  // themeSource is always a valid brand object used for colours, logos, layout
  const brand       = getActiveBrand();
  const themeSource = brand || getBrands()[0] || (() => {
    const s = getSettings();
    return { name: s.brandName || 'Our Brand', currency: s.currency || '$', logo: s.logo || '', logoRight: s.logoRight || '', colors: s.colors || {}, showClock: true, timeFormat: 'british', display: { portrait: { cols: 3, rows: 5, maxItems: 15 }, landscape: { cols: 5, rows: 3, maxItems: 15 } } };
  })();

  // ── TEMPLATE RESOLUTION ──────────────────────────────────────────────────────
  // Resolve the active Offer Board template and derive effective settings.
  // Template values always win over top-level brand defaults.
  const tpl = getActiveTemplate(brand || themeSource);

  const effectiveColors       = (tpl && tpl.colors)      || themeSource.colors      || {};
  const effectiveDisplay      = (tpl && tpl.display)     || themeSource.display     || {};
  const effectiveShowHeader   = tpl ? (tpl.showHeader    !== false) : (themeSource.showHeader !== false);
  const effectiveShowClock    = tpl ? (tpl.showClock     !== false) : (themeSource.showClock  !== false);
  const effectiveCampaignMode = (tpl && tpl.campaignMode)    || themeSource.campaignMode    || 'override';
  const effectiveTimeFormat   = (tpl && tpl.timeFormat)      || themeSource.timeFormat      || 'british';
  const effectiveShowStoreName    = tpl ? (tpl.showStoreName    !== false) : true;
  const effectivePersonalGreeting = tpl ? (tpl.personalGreeting !== false) : true;
  const effectiveHeaderTitle      = (tpl && tpl.headerTitle)   || themeSource.name || ''; // main heading; falls back to brand name
  const effectiveHeaderCopy       = (tpl && tpl.headerCopy)   || '';         // sub-header; falls back to menu type label
  const effectiveIconPosition     = (tpl && tpl.iconPosition)  || 'left';
  const effectiveHeaderLogoType   = (tpl && tpl.headerLogoType)|| 'logo';
  const effectiveTemplateType     = (tpl && tpl.templateType)  || TEMPLATE_TYPE || '';
  const effectiveHeroCategory     = (tpl && tpl.heroCategory)  || '';
  const effectiveGridCategories   = (tpl && Array.isArray(tpl.categoriesToPresent) && tpl.categoriesToPresent.length > 0)
    ? tpl.categoriesToPresent : [];

  // Persist time format for updateClock() which runs outside render()
  _effectiveTimeFormat = effectiveTimeFormat;

  applyColorScheme({ colors: effectiveColors });

  // Apply orientation class to boardRoot
  const boardRoot = document.getElementById('boardRoot');
  boardRoot.className = 'board ' + ORIENTATION;

  // Dynamic CSS element
  let dynStyle = document.getElementById('dynamic-grid-css');
  if (!dynStyle) {
    dynStyle = document.createElement('style');
    dynStyle.id = 'dynamic-grid-css';
    document.head.appendChild(dynStyle);
  }

  const items = getItems();

  // ── LOGO RESOLUTION ────────────────────────────────────────────────────────
  // Determine which brand asset to use based on template's headerLogoType setting
  const _headerAsset = effectiveHeaderLogoType === 'icon'  ? (themeSource.icon || themeSource.logo || '')
                     : effectiveHeaderLogoType === 'none'  ? ''
                     : /* 'logo' default */                  (themeSource.logo || '');
  let logoLeft = '', logoRight = '';
  if      (effectiveIconPosition === 'left')   { logoLeft  = _headerAsset; }
  else if (effectiveIconPosition === 'right')  { logoRight = _headerAsset; }
  else if (effectiveIconPosition === 'both')   { logoLeft  = logoRight = _headerAsset; }
  // 'center' and 'none': both sides empty; center logo rendered inside header-center below

  const brandName = esc(themeSource.name     || 'Our Brand');
  const currency  = esc(themeSource.currency || '$');

  // ── STEP 1: Filter first so totalItems drives layout ────────────────────────
  // brand === null means no brand filter — show all active items for this menu type
  const allFiltered = items.filter(i =>
    i.active &&
    (MENU_TYPES.length === 0 || (i.menuTypes || []).some(t => MENU_TYPES.includes(t))) &&
    (brand === null || !i.brand || i.brand === brand.id)
  );

  // Apply hideOutOfStock — from template setting (wins) or brand default
  const displayFiltered = (effectiveDisplay && effectiveDisplay.hideOutOfStock)
    ? allFiltered.filter(i => !isOos(i.sku))
    : allFiltered;

  // ── STEP 1b: Apply campaign SKU filter (Personalisation Hub) ────────────────
  // When a Device UDID is in the URL and the API returns SKUs, override the display.
  // When brand === null (show-all mode), campaign SKU filtering is skipped entirely —
  // only a board with a defined brand applies personalised SKU filtering.
  let campaignFiltered = displayFiltered;
  if (_campaignSkus && _campaignSkus.length > 0 && brand !== null) {
    const mode = effectiveCampaignMode || (_settings.phApi && _settings.phApi.campaignMode) || 'override';
    // Case-insensitive SKU set — handles mismatches between API and Firestore casing
    const skuSetLower = new Set(_campaignSkus.map(s => (s || '').trim().toLowerCase()));
    const skuMatch = i => skuSetLower.has((i.sku || '').trim().toLowerCase());
    if (mode === 'override') {
      // Ignore menu type — show any active item matching campaign SKUs (brand-constrained)
      campaignFiltered = items.filter(i =>
        i.active &&
        (!i.brand || i.brand === brand.id) &&
        skuMatch(i)
      );
      // Also apply hideOutOfStock if template/brand requires it
      if (effectiveDisplay && effectiveDisplay.hideOutOfStock) {
        campaignFiltered = campaignFiltered.filter(i => !isOos(i.sku));
      }
    } else {
      // 'filter' mode — campaign SKUs narrowed to current menu type
      campaignFiltered = displayFiltered.filter(i => skuMatch(i));
    }
    console.log('[Render] Campaign SKUs:', _campaignSkus, '| Matched', campaignFiltered.length, 'of', items.length, 'items');
    _dbgMatchCount = `${campaignFiltered.length} of ${items.length} items`;
  } else {
    _dbgMatchCount = null;
  }
  _updateDebugPanel();

  // Sort: in-stock first, then by category, then name
  campaignFiltered.sort((a, b) => {
    const ao = isOos(a.sku), bo = isOos(b.sku);
    if (ao !== bo) return ao ? 1 : -1;
    if ((a.category || '') !== (b.category || '')) return (a.category || '').localeCompare(b.category || '');
    return a.name.localeCompare(b.name);
  });

  const totalItems = campaignFiltered.length;

  // ── STEP 2: Compute layout based on totalItems ───────────────────────────────
  const dispCfg = (effectiveDisplay && effectiveDisplay[ORIENTATION]) || {};
  let COLS, PAGE_SIZE;

  if (totalItems > 0 && totalItems <= 10) {
    // Dynamic small-count layout — all items on one screen, no pagination
    if (totalItems === 1) {
      COLS = 1;
    } else if (totalItems === 2) {
      // Portrait: stack one above the other; Landscape: side-by-side
      COLS = ORIENTATION === 'portrait' ? 1 : 2;
    } else if (totalItems <= 4) {
      COLS = 2;
    } else {
      // 5–10: portrait 2-col ("2×2×2" for 6 items); landscape 5-col unchanged
      COLS = ORIENTATION === 'portrait' ? 2 : 5;
    }
    PAGE_SIZE = totalItems;
  } else {
    // Standard brand settings + pagination for >10 items (or zero)
    COLS      = Math.max(1, parseInt(dispCfg.cols)     || (ORIENTATION === 'portrait' ? 3 : 5));
    const ROWS = Math.max(1, parseInt(dispCfg.rows)    || (ORIENTATION === 'portrait' ? 5 : 3));
    PAGE_SIZE  = Math.min(
      Math.max(1, parseInt(dispCfg.maxItems) || (COLS * ROWS)),
      COLS * ROWS
    );
  }

  const totalPages = Math.max(1, Math.ceil(totalItems / PAGE_SIZE));

  // Clamp currentPage
  if (currentPage > totalPages) currentPage = totalPages;
  if (currentPage < 1) currentPage = 1;

  // Slice page
  const pageStart = (currentPage - 1) * PAGE_SIZE;
  const pageItems = campaignFiltered.slice(pageStart, pageStart + PAGE_SIZE);

  // ── STEP 3: Inject dynamic grid + scale-up CSS ───────────────────────────────
  const gridRows = Math.max(1, Math.ceil(pageItems.length / COLS));
  let dynCss = `
    .items-grid {
      grid-template-columns: repeat(${COLS}, 1fr) !important;
      grid-template-rows: repeat(${gridRows}, 1fr) !important;
    }
    .item-cell:nth-child(${COLS}n) { border-right: none !important; }
  `;

  // Scale up tiles for small item counts so they fill the screen
  if (totalItems === 1) {
    dynCss += `
      .board.portrait .item-thumb { flex: 0 0 65% !important; max-height: none !important; }
      .board.landscape .item-thumb { width: 55% !important; }
      .item-name { font-size: clamp(20px, 3.2vw, 40px) !important; }
      .item-price { font-size: clamp(22px, 3.8vw, 48px) !important; }
      .nutr-val { font-size: clamp(16px, 2.2vw, 28px) !important; }
      .nutr-unit { font-size: clamp(12px, 1.6vw, 20px) !important; }
      .nutr-calories .nutr-val { font-size: clamp(20px, 3vw, 38px) !important; }
      .item-cat-badge { font-size: clamp(11px, 1.3vw, 16px) !important; padding: 4px 12px !important; }
      .item-meta-bar { padding: clamp(8px, 1.2vw, 16px) clamp(14px, 2vw, 24px) !important; }
    `;
  } else if (totalItems <= 4) {
    dynCss += `
      .board.portrait .item-thumb { flex: 0 0 55% !important; max-height: none !important; }
      .board.landscape .item-thumb { width: 40% !important; }
      .item-name { font-size: clamp(15px, 2.2vw, 28px) !important; }
      .item-price { font-size: clamp(17px, 2.8vw, 36px) !important; }
      .nutr-val { font-size: clamp(13px, 1.8vw, 22px) !important; }
      .nutr-unit { font-size: clamp(10px, 1.2vw, 15px) !important; }
      .nutr-calories .nutr-val { font-size: clamp(16px, 2.4vw, 30px) !important; }
      .item-cat-badge { font-size: clamp(10px, 1.1vw, 13px) !important; }
    `;
  } else if (totalItems <= 10 && ORIENTATION === 'portrait') {
    // 5–10 items, portrait 2-col: slightly larger fonts/image than 3-col default
    dynCss += `
      .board.portrait .item-thumb { flex: 0 0 48% !important; max-height: none !important; }
      .item-name  { font-size: clamp(13px, 1.9vw, 26px) !important; }
      .item-price { font-size: clamp(15px, 2.5vw, 34px) !important; }
      .nutr-val   { font-size: clamp(12px, 1.6vw, 20px) !important; }
      .nutr-unit  { font-size: clamp(9px,  1.1vw, 14px) !important; }
      .nutr-calories .nutr-val { font-size: clamp(14px, 2vw, 26px) !important; }
    `;
  } else if (totalItems <= 10 && ORIENTATION === 'landscape') {
    // 5–10 items in landscape: 5-col grid creates portrait-shaped tiles (tall + narrow)
    // Switch to portrait-card layout: image on top, text below — fills the tall cells properly
    dynCss += `
      .board.landscape .item-cell { flex-direction: column !important; }
      .board.landscape .item-thumb {
        width: 100% !important;
        flex: 0 0 60% !important;
        max-height: none !important;
      }
    `;
  }

  dynStyle.textContent = dynCss;

  // ── HEADER ──────────────────────────────────────────────────────────────────
  const logoSlot = (src, side) => src
    ? `<div class="header-logo-wrap"><img src="${src}" alt="${esc(side)} logo"></div>`
    : `<div class="header-logo-wrap no-logo"></div>`;

  const showHeader = effectiveShowHeader;
  const showClock  = effectiveShowClock;
  const headerHtml = `
    ${showHeader ? `
    <div class="board-header">
      ${logoSlot(logoLeft, 'Left')}
      <div class="header-center">
        ${effectiveIconPosition === 'center' && _headerAsset
          ? `<img src="${esc(_headerAsset)}" alt="${brandName} logo" style="height:2.4em;max-width:180px;object-fit:contain;margin-bottom:4px;">`
          : ''}
        <div class="header-brand">${esc(effectiveHeaderTitle)}</div>
        <div class="header-menu-type">${esc(effectiveHeaderCopy || meta.label)}</div>
      </div>
      ${logoSlot(logoRight, 'Right')}
    </div>
    ` : ''}
    ${showClock ? `
      <div class="clock-bar">
        ${MOCK_API_FILE ? `<span class="mock-badge">🧪 MOCK</span>` : ''}
        ${(effectivePersonalGreeting && _campaignFirstName)
          ? `<div class="greeting-text">${esc(_campaignFirstName).toUpperCase()}, THIS IS WHAT WE RECOMMEND FOR YOU</div>`
          : ((effectiveShowStoreName && _storeName) ? `<div class="greeting-text">${_storeName}</div>` : '')}
        <div class="time-display" id="clockDisplay"></div>
      </div>
    ` : ''}
  `;

  // ── BODY ────────────────────────────────────────────────────────────────────
  let bodyHtml = '';

  // Helper to render a standard item cell
  function _itemCell(item) {
    const oos = isOos(item.sku);
    const cat = item.category || '';
    const thumbInner = (item.images && item.images[0])
      ? `<img src="${item.images[0]}" alt="${esc(item.name)}" loading="lazy">`
      : `<div class="item-thumb-placeholder">🍽️</div>`;
    return `
      <div class="item-cell${oos ? ' oos-cell' : ''}">
        <div class="item-thumb">${thumbInner}</div>
        <div class="item-right">
          <div class="item-meta-bar">
            <span class="item-price">${currency}${parseFloat(item.price || 0).toFixed(2)}</span>
            ${cat ? `<span class="item-cat-badge">${esc(cat)}</span>` : ''}
          </div>
          <div class="item-text">
            <div class="item-name">${esc(item.name)}</div>
            ${buildNutrition(item)}
          </div>
        </div>
        <div class="oos-overlay"><div class="oos-stamp"><div class="oos-stamp-text">SOLD OUT</div></div></div>
      </div>`;
  }

  if (!totalItems) {
    const campaignActive = _campaignSkus && _campaignSkus.length > 0;
    bodyHtml = `
      <div class="board-empty">
        <div class="icon">${meta.emoji}</div>
        <h2>${campaignActive ? 'No Recommended Items' : 'No Items Available'}</h2>
        <p>${campaignActive
          ? 'No menu items match your personalised selection.'
          : `There are currently no active ${esc(meta.label)} items for this location.`
        }</p>
      </div>
    `;
  } else if (effectiveTemplateType === 'feature-hero-board') {
    // ── FEATURE HERO SPOTLIGHT LAYOUT ────────────────────────────────────────
    // Pick the hero item: first item matching heroCategory (if set), else first item overall
    let heroPool = campaignFiltered;
    if (effectiveHeroCategory) {
      const catPool = campaignFiltered.filter(i => i.category === effectiveHeroCategory);
      if (catPool.length > 0) heroPool = catPool;
    }
    const heroItem = heroPool[0] || null;

    // Grid items: everything except the hero item, filtered by categoriesToPresent if set
    let gridItems = campaignFiltered.filter(i => i !== heroItem);
    if (effectiveGridCategories.length > 0) {
      gridItems = gridItems.filter(i => effectiveGridCategories.includes(i.category || ''));
    }

    // Compute grid layout from template settings
    const heroCols = ORIENTATION === 'portrait'
      ? (parseInt((effectiveDisplay.portrait || {}).cols) || 3)
      : (parseInt((effectiveDisplay.landscape || {}).cols) || 4);
    const heroRows = ORIENTATION === 'portrait'
      ? (parseInt((effectiveDisplay.portrait || {}).rows) || 2)
      : (parseInt((effectiveDisplay.landscape || {}).rows) || 2);
    const heroMax = heroCols * heroRows;
    const gridPage = gridItems.slice(0, heroMax);

    // Inject grid CSS for hero grid (appended to existing dynStyle)
    dynStyle.textContent += `
      .hero-items-grid {
        display: grid;
        grid-template-columns: repeat(${heroCols}, 1fr) !important;
        grid-template-rows: repeat(${heroRows}, 1fr) !important;
        height: 100%;
      }
    `;

    // Build hero slot HTML
    let heroSlotHtml = '';
    if (heroItem) {
      const heroImg = (heroItem.images && heroItem.images[0])
        ? `<img src="${heroItem.images[0]}" alt="${esc(heroItem.name)}" loading="lazy">`
        : `<div class="hero-img-placeholder">🏷️</div>`;
      const heroDesc = heroItem.description
        ? `<div class="hero-desc">${esc(heroItem.description)}</div>` : '';
      heroSlotHtml = `
        <div class="hero-slot">
          <div class="hero-img">${heroImg}</div>
          <div class="hero-info">
            <div class="hero-badge">${esc(heroItem.category || 'Featured')}</div>
            <div class="hero-name">${esc(heroItem.name)}</div>
            <div class="hero-price">${currency}${parseFloat(heroItem.price || 0).toFixed(2)}</div>
            ${heroDesc}
          </div>
        </div>`;
    }

    // Build grid cells
    const gridCells = gridPage.map(_itemCell).join('');

    bodyHtml = `
      <div class="hero-body">
        ${heroSlotHtml}
        <div class="hero-grid-wrap">
          <div class="board-body">
            <div class="hero-items-grid">${gridCells}</div>
          </div>
        </div>
      </div>`;
  } else {
    // Standard flat grid — all items on this page
    const cells = pageItems.map(_itemCell).join('');
    bodyHtml = `<div class="board-body"><div class="items-grid">${cells}</div></div>`;
  }

  // ── FOOTER ──────────────────────────────────────────────────────────────────
  let pageInfoText = '';
  if (totalPages > 1) {
    pageInfoText = SCREEN_LOCK
      ? `Screen ${currentPage} of ${totalPages} (locked)`
      : `Screen ${currentPage} of ${totalPages}`;
  }

  const showProgressBar = !SCREEN_LOCK && totalPages > 1;

  const footerHtml = `
    <div class="board-footer">
      <div class="footer-text">${brandName} — ${esc(meta.label)}</div>
      <div class="footer-page-info">${esc(pageInfoText)}</div>
      <div class="footer-refresh">
        <span class="refresh-dot"></span> Live sync enabled
      </div>
    </div>
    ${showProgressBar ? '<div class="rotation-bar-wrap"><div class="rotation-bar" id="rotationBar"></div></div>' : ''}
  `;

  // ── INJECT ──────────────────────────────────────────────────────────────────
  boardRoot.innerHTML = headerHtml + bodyHtml + footerHtml;

  updateClock();

  if (!SCREEN_LOCK && totalPages > 1) {
    startRotation(totalPages);
  }
}

// ── INIT ─────────────────────────────────────────────────────────────────────
document.addEventListener('DOMContentLoaded', () => {
  if (!MENU_TYPE || (!STORE_CODE && !DEVICE_UDID)) {
    const missing = !MENU_TYPE
      ? 'a Menu Type (<code>?menu=supplements</code>)'
      : 'a Store Code (<code>?store=STORE001</code>) or Device UDID (<code>?device=…</code>)';
    document.getElementById('boardRoot').innerHTML = `
      <div class="error-board">
        <div class="icon">📺</div>
        <h2>Invalid Offer Board URL</h2>
        <p>This offer board requires ${missing}.</p>
        <br>
        <p>Example URLs:</p>
        <code>menu-board.html?store=STORE001&amp;menu=supplements</code><br>
        <code>menu-board.html?device=&lt;UDID&gt;&amp;menu=vitamins</code>
        <a href="index.html">← Back to Portal</a>
      </div>
    `;
    return;
  }

  // Per-store stock listener — only when a store code is present
  if (STORE_CODE) {
    onSnapshot(doc(db, STOCK_COLL, STORE_CODE), snap => {
      const newStock = snap.exists() ? snap.data() : {};
      const h = _fp(newStock);
      if (h === _stockHash) return;   // data unchanged — skip render
      _stockHash = h;
      _stock = newStock;
      render();
    });
  }

  updateClock();
  setInterval(updateClock, 1000);

  // Campaign polling — only active when a Device UDID is provided in the URL.
  // Key derivation is cached so only the first call pays the PBKDF2 cost (~100ms);
  // subsequent polls reuse the cached token and complete in network time only.
  if (DEVICE_UDID) {
    // Kick off key derivation immediately so it is ready before the first poll
    _deriveKey();
    pollCampaign();                   // immediate first call
    setInterval(pollCampaign, 5000);  // then every 5 s for near-instant updates
  }
});
</script>
